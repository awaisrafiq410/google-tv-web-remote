<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android TV Web Remote</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#38bdf8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/assets/icon-192.png">
</head>
<body>
    <div class="container">
        <h1>Google TV Remote</h1>

        <!-- Discovery / Device Selection -->
        <div id="setup-card" class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="font-size: 1.125rem;">Discovered Devices</h2>
                <button id="refresh-btn" class="btn-remote" style="padding: 0.5rem; border-radius: 8px;">
                    <i data-lucide="refresh-cw" style="width: 18px; height: 18px;"></i>
                </button>
            </div>
            <ul id="device-list" class="device-list">
                <!-- Devices will be injected here -->
                <p id="no-devices" style="text-align: center; color: var(--text-secondary);">Scanning for TVs...</p>
            </ul>
        </div>

        <!-- Remote Controls (Hidden initially) -->
        <div id="remote-card" class="card hidden">
            <div class="remote-grid">
                <!-- Power & Home Bar -->
                <div class="btn-row">
                    <button class="btn-remote btn-circle btn-power" data-command="POWER">
                        <i data-lucide="power"></i>
                    </button>
                    <button class="btn-remote btn-circle" data-command="HOME">
                        <i data-lucide="home"></i>
                    </button>
                    <button class="btn-remote btn-circle" data-command="BACK">
                        <i data-lucide="arrow-left"></i>
                    </button>
                </div>

                <!-- D-Pad -->
                <div class="dpad">
                    <button class="btn-remote btn-up" data-command="DPAD_UP"><i data-lucide="chevron-up"></i></button>
                    <button class="btn-remote btn-left" data-command="DPAD_LEFT"><i data-lucide="chevron-left"></i></button>
                    <button class="btn-remote btn-center" data-command="DPAD_CENTER">OK</button>
                    <button class="btn-remote btn-right" data-command="DPAD_RIGHT"><i data-lucide="chevron-right"></i></button>
                    <button class="btn-remote btn-down" data-command="DPAD_DOWN"><i data-lucide="chevron-down"></i></button>
                </div>

                <!-- Volume & Media -->
                <div class="btn-row">
                    <button class="btn-remote btn-circle" data-command="VOLUME_DOWN"><i data-lucide="volume-1"></i></button>
                    <button class="btn-remote btn-circle" data-command="MUTE"><i data-lucide="volume-x"></i></button>
                    <button class="btn-remote btn-circle" data-command="VOLUME_UP"><i data-lucide="volume-2"></i></button>
                </div>
                
                <div class="btn-row">
                    <button class="btn-remote" style="width: 100%; border-radius: 12px; gap: 0.5rem;" data-command="MEDIA_PLAY_PAUSE">
                        <i data-lucide="play"></i>
                        <i data-lucide="pause"></i>
                    </button>
                </div>

                <!-- Apps -->
                <div class="apps-grid">
                    <button class="app-btn" data-app="https://www.youtube.com">
                        <img src="/assets/youtube.png" alt="YouTube" onerror="this.classList.add('hidden')">
                        YouTube
                    </button>
                    <button class="app-btn" data-app="org.jellyfin.androidtv">
                        <img src="/assets/jellyfin.png" alt="Jellyfin" onerror="this.classList.add('hidden')">
                        Jellyfin
                    </button>
                    <button class="app-btn" data-app="com.google.android.youtube.tvmusic">
                        <img src="/assets/yt_music.png" alt="YT Music" onerror="this.classList.add('hidden')">
                        YT Music
                    </button>
                    <button class="app-btn" data-app="com.netmirror.app">
                        <img src="/assets/netmirror.png" alt="Netmirror" onerror="this.classList.add('hidden')">
                        Netmirror
                    </button>
                    <button class="app-btn" data-app="com.stremio.one">
                        <img src="/assets/stremio.png" alt="Stremio" onerror="this.classList.add('hidden')">
                        Stremio
                    </button>
                </div>

                <!-- Text Input -->
                <div style="width: 100%;">
                    <p style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Keyboard Input (Press Enter to send)</p>
                    <input type="text" id="keyboard-input" class="kbd-input" placeholder="Type here to send text to TV...">
                </div>

                <!-- Shortcuts Hint -->
                <div class="shortcuts-hint">
                    <p><span>Space</span> Play/Pause &bull; <span>M</span> Mute &bull; <span>Arrows</span> Navigate</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Pairing Modal -->
    <div id="pairing-overlay" class="overlay hidden">
        <div class="pin-modal">
            <h2>Pairing Required</h2>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Enter the 6-digit code displayed on your TV</p>
            <input type="text" id="pin-input" class="pin-input" maxlength="6" placeholder="000000">
            <button id="submit-pin" class="btn-primary">Connect TV</button>
            <button id="cancel-pairing" style="margin-top: 1rem; background: transparent; border: none; color: var(--text-secondary); cursor: pointer;">Cancel</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
