<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android TV Web Remote</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#38bdf8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/assets/icon-192.png">
</head>

<body>
    <div class="container">
        <h1>Google TV Remote</h1>

        <!-- Discovery / Device Selection -->
        <div id="setup-card" class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="font-size: 1.125rem;">Discovered Devices</h2>
                <button id="refresh-btn" class="btn-remote" style="padding: 0.5rem; border-radius: 8px;">
                    <i data-lucide="refresh-cw" style="width: 18px; height: 18px;"></i>
                </button>
            </div>
            <ul id="device-list" class="device-list">
                <!-- Devices will be injected here -->
                <p id="no-devices" style="text-align: center; color: var(--text-secondary);">Scanning for TVs...</p>
            </ul>
        </div>

        <!-- Remote Controls (Hidden initially) -->
        <div id="remote-card" class="card hidden">
            <!-- Top Header Row -->
            <div class="top-row">
                <button class="btn-remote btn-circle btn-power" data-command="POWER"><i
                        data-lucide="power"></i></button>
                <div class="header-title">Remote</div>
                <button class="btn-remote btn-circle btn-mute" data-command="MUTE"><i
                        data-lucide="volume-x"></i></button>
            </div>

            <div class="remote-grid">
                <!-- Tab content: Remote -->
                <div id="tab-remote" class="tab-content active">
                    <!-- Nav Buttons (Home/Back) -->
                    <div class="nav-row">
                        <button class="btn-remote btn-nav" data-command="HOME"><i data-lucide="home"></i></button>
                        <button class="btn-remote btn-nav" data-command="BACK"><i data-lucide="arrow-left"></i></button>
                    </div>

                    <!-- Centered Circular D-Pad -->
                    <div class="dpad-container">
                        <div class="dpad-ring">
                            <button class="btn-dpad dpad-up" data-command="DPAD_UP"><i
                                    data-lucide="chevron-up"></i></button>
                            <button class="btn-dpad dpad-down" data-command="DPAD_DOWN"><i
                                    data-lucide="chevron-down"></i></button>
                            <button class="btn-dpad dpad-left" data-command="DPAD_LEFT"><i
                                    data-lucide="chevron-left"></i></button>
                            <button class="btn-dpad dpad-right" data-command="DPAD_RIGHT"><i
                                    data-lucide="chevron-right"></i></button>
                            <button class="btn-remote btn-center" data-command="DPAD_CENTER">OK</button>
                        </div>
                    </div>

                    <!-- Media & Volume Pill -->
                    <div class="media-pill">
                        <button class="btn-media" data-command="VOLUME_DOWN"><i data-lucide="minus"></i></button>
                        <button class="btn-media btn-play" data-command="MEDIA_PLAY_PAUSE">
                            <i data-lucide="play" style="width: 16px; height: 16px; margin-right: -2px;"></i>
                            <i data-lucide="pause" style="width: 16px; height: 16px; margin-left: -2px;"></i>
                        </button>
                        <button class="btn-media" data-command="VOLUME_UP"><i data-lucide="plus"></i></button>
                    </div>
                </div>

                <!-- Tab content: Apps -->
                <div id="tab-apps" class="tab-content">
                    <div class="apps-grid" id="apps-container">
                        <!-- Apps will be injected here via JS -->
                    </div>
                    <button id="open-manage-apps" class="btn-primary" style="margin-top: 1.5rem; width: auto; background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-primary);">
                        <i data-lucide="settings-2" style="width: 16px; height: 16px; margin-right: 8px; vertical-align: middle;"></i>
                        Manage Apps
                    </button>
                </div>

                <!-- Tab content: Keyboard -->
                <div id="tab-kbd" class="tab-content">
                    <div style="width: 100%;">
                        <p style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Keyboard
                            Input (Press Enter to send)</p>
                        <input type="text" id="keyboard-input" class="kbd-input"
                            placeholder="Type here to send text to TV...">
                    </div>
                </div>
            </div>

            <!-- Tab Bar (Moved to footer) -->
            <div class="tab-bar-container">
                <div class="tab-bar">
                    <button class="tab-btn active" data-tab="tab-remote">
                        <i data-lucide="gamepad-2"></i>
                        Remote
                    </button>
                    <button class="tab-btn" data-tab="tab-apps">
                        <i data-lucide="layout-grid"></i>
                        Apps
                    </button>
                    <button class="tab-btn tab-disabled" data-tab="tab-kbd" title="Text input currently unavailable">
                        <i data-lucide="keyboard"></i>
                        Keyboard
                    </button>
                </div>
                <button id="settings-btn" class="btn-remote btn-circle" style="width: 44px; height: 44px;">
                    <i data-lucide="settings"></i>
                </button>
            </div>

            <!-- Globally Visible Shortcuts Hint -->
            <div class="shortcuts-hint">
                <p><span>Space</span> Play/Pause &bull; <span>M</span> Mute &bull; <span>Arrows</span> Navigate</p>
            </div>
        </div>
    </div>

    <!-- Pairing Modal -->
    <div id="pairing-overlay" class="overlay hidden">
        <div class="pin-modal">
            <h2>Pairing Required</h2>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Enter the 6-digit code displayed on your TV</p>
            <input type="text" id="pin-input" class="pin-input" maxlength="6" placeholder="000000">
            <button id="submit-pin" class="btn-primary">Connect TV</button>
            <button id="cancel-pairing"
                style="margin-top: 1rem; background: transparent; border: none; color: var(--text-secondary); cursor: pointer;">Cancel</button>
        </div>
    </div>

    <!-- Manage Apps Modal -->
    <div id="manage-apps-overlay" class="overlay hidden">
        <div class="pin-modal" style="max-height: 90vh; overflow-y: auto;">
            <h2 style="margin-bottom: 1rem;">Manage Apps</h2>
            
            <div id="manage-apps-list" style="display: flex; flex-direction: column; gap: 0.5rem; text-align: left; margin-bottom: 1.5rem;">
                <!-- App list injected here -->
            </div>

            <div style="border-top: 1px solid var(--glass-border); padding-top: 1.5rem; margin-top: 1.5rem; text-align: left;">
                <h3 style="font-size: 1rem; margin-bottom: 1rem;">Add New App</h3>
                <input type="text" id="new-app-name" class="kbd-input" style="margin-top: 0; margin-bottom: 0.75rem;" placeholder="App Name (e.g. Netflix)">
                <input type="text" id="new-app-pkg" class="kbd-input" style="margin-top: 0; margin-bottom: 0.75rem;" placeholder="Package Name / URL">
                <input type="text" id="new-app-icon" class="kbd-input" style="margin-top: 0; margin-bottom: 1rem;" placeholder="Icon URL (https://...)">
                <button id="add-app-btn" class="btn-primary">Add App</button>
            </div>

            <button id="close-manage-apps" style="margin-top: 1.5rem; background: transparent; border: none; color: var(--text-secondary); cursor: pointer;">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
